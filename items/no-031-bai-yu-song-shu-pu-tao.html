            <p>
              脂白和田「松鼠葡萄」鏤空雕件。玉必有工，工必有意，意必吉祥。
              松，意指蒼松，有長壽之意；鼠，有數來寶的寓意；松鼠則寓意財壽雙收、
              身體健康、財源滾滾。葡萄多籽，寓意多子；鼠的繁衍能力也強，
              因此和田松鼠葡萄也寓意多子多孫、子孫滿堂。以現代說法看，
              松鼠葡萄雕件也有聚財與長壽之意，顆顆葡萄代表錢滾錢、錢母生錢子。
